name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all-in-one HTML
        run: bun run build
        env:
          VERSION: ${{ github.ref_name }}

      - name: Prepare release assets
        run: |
          cd dist
          mv index.html management.html
          ls -lh management.html

      - name: Generate release notes
        run: |
          set -euo pipefail
          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --list 'v*' --sort=-v:refname | grep -v "^${current_tag}$" | head -n 1 || true)"
          if [ -n "${previous_tag}" ]; then
            range="${previous_tag}..${current_tag}"
          else
            range="${current_tag}"
          fi

          : > release-notes.md
          git log --pretty=format:"- %h %s" "${range}" >> release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/management.html
          body_path: release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-discord:
    name: Notify Discord
    runs-on: ubuntu-latest
    if: ${{ always() && startsWith(github.ref, 'refs/tags/v') }}
    needs:
      - build-and-release
    steps:
      - name: Notify admin channel
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_ADMIN_WEBHOOK_URL }}
          NEEDS_JSON: ${{ toJson(needs) }}
          RELEASE_KIND: CPAMC release
          RELEASE_ARTIFACTS: management.html
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [[ -z "${DISCORD_WEBHOOK_URL:-}" ]]; then
            echo "DISCORD_ADMIN_WEBHOOK_URL is not set; skipping Discord notification."
            exit 0
          fi
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          needs = json.loads(os.environ["NEEDS_JSON"])
          bad_jobs = {name: data.get("result") for name, data in needs.items() if data.get("result") != "success"}
          ok = not bad_jobs
          title = f"{'✅' if ok else '❌'} {os.environ['RELEASE_KIND']} {'完成' if ok else '失败'}"
          lines = [
              title,
              f"仓库：{os.environ['REPOSITORY']}",
              f"Tag：{os.environ['TAG_NAME']}",
              f"产物：{os.environ['RELEASE_ARTIFACTS']}",
              f"Release：{os.environ['RELEASE_URL']}",
              f"Workflow：{os.environ['RUN_URL']}",
          ]
          if bad_jobs:
              failed = ", ".join(f"{name}={result}" for name, result in sorted(bad_jobs.items()))
              lines.append(f"异常 job：{failed}")

          payload = {
              "content": "\n".join(lines),
              "allowed_mentions": {"parse": []},
          }
          request = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK_URL"],
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "ErgouziReleaseBot/1.0 (+https://github.com/aiman-labs)",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=15) as response:
                  if response.status not in (200, 204):
                      body = response.read().decode("utf-8", "replace")[:500]
                      raise RuntimeError(f"Discord notification returned HTTP {response.status}: {body}")
          except urllib.error.HTTPError as exc:
              body = exc.read().decode("utf-8", "replace")[:500]
              print(f"Discord notification failed with HTTP {exc.code}: {body}", file=sys.stderr)
              raise
          except Exception as exc:
              print(f"Discord notification failed: {type(exc).__name__}: {exc}", file=sys.stderr)
              raise
          PY
